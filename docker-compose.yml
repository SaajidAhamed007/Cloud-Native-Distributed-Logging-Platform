services:

  deployment-service:
    build:
      context: ./apps/deployment-service
    container_name: deployment-service

  monitoring-service:
    build:
      context: ./apps/monitoring-service
    container_name: monitoring-service

  incident-service:
    build:
      context: ./apps/incident-service
    container_name: incident-service

  kafka:
    image: apache/kafka:latest
    container_name: kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    depends_on:
      - kafka

  log-processor:
    build:
      context: ./services/log-processor

    container_name: log-processor

    depends_on:
      - kafka
      - opensearch

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: opensearch

    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"

    ports:
      - "9200:9200"

    ulimits:
      memlock:
        soft: -1
        hard: -1
        
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards

    ports:
      - "5601:5601"

    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'

    depends_on:
      - opensearch