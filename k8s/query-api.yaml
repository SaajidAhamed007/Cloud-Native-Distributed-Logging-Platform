apiVersion: apps/v1
kind: Deployment

metadata:
  name: query-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: query-api

  template:
    metadata:
      labels:
        app: query-api

    spec:
      containers:
        - name: query-api
          image: query-api:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service

metadata:
  name: query-api

spec:
  selector:
    app: query-api

  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP

  type: NodePort