apiVersion: apps/v1
kind: Deployment

metadata:
  name: opensearch

spec:
  replicas: 1

  selector:
    matchLabels:
      app: opensearch

  template:
    metadata:
      labels:
        app: opensearch

    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:latest

          ports:
            - containerPort: 9200
            - containerPort: 9300

          env:
            - name: discovery.type
              value: single-node

            - name: DISABLE_SECURITY_PLUGIN
              value: "true"

            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"

---
apiVersion: v1
kind: Service

metadata:
  name: opensearch

spec:
  selector:
    app: opensearch

  ports:
    - port: 9200
      targetPort: 9200
      protocol: TCP

  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: opensearch-dashboards

spec:
  replicas: 1

  selector:
    matchLabels:
      app: opensearch-dashboards

  template:
    metadata:
      labels:
        app: opensearch-dashboards

    spec:
      containers:
        - name: opensearch-dashboards
          image: opensearchproject/opensearch-dashboards:latest

          ports:
            - containerPort: 5601

          env:
            - name: OPENSEARCH_HOSTS
              value: '["http://opensearch:9200"]'

---
apiVersion: v1
kind: Service

metadata:
  name: opensearch-dashboards

spec:
  selector:
    app: opensearch-dashboards

  ports:
    - port: 5601
      targetPort: 5601
      protocol: TCP

  type: NodePort